name: sigevappsoportefrontend
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  shared_preferences: ^2.5.3
  skeletonizer: ^2.1.1
  page_animation_transition: ^1.0.0
  flutter_bloc: ^9.1.1
  url_launcher: ^6.3.2
  toastification: ^3.0.3
  get_it: ^9.1.1
  flutter_localization: ^0.3.3
  go_router: ^17.0.0
  file_picker: ^10.3.7
  easy_image_viewer: ^1.5.1
  webview_flutter: ^4.13.0
  flutter_inappwebview: ^6.1.5
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - images/
  fonts:
    - family: chivo
      fonts:
        - asset: fonts/Chivo-Black.ttf
        - asset: fonts/Chivo-Bold.ttf
        - asset: fonts/Chivo-ExtraBold.ttf
        - asset: fonts/Chivo-ExtraLight.ttf
        - asset: fonts/Chivo-Light.ttf
        - asset: fonts/Chivo-LightItalic.ttf
        - asset: fonts/Chivo-Medium.ttf
        - asset: fonts/Chivo-MediumItalic.ttf
        - asset: fonts/Chivo-Regular.ttf
        - asset: fonts/Chivo-Thin.ttf
    - family: manrope
      fonts:
        - asset: fonts/Manrope-Bold.ttf
        - asset: fonts/Manrope-ExtraBold.ttf
        - asset: fonts/Manrope-ExtraLight.ttf
        - asset: fonts/Manrope-Light.ttf
        - asset: fonts/Manrope-Medium.ttf
        - asset: fonts/Manrope-Regular.ttf
        - asset: fonts/Manrope-SemiBold.ttf